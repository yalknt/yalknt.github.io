// Mesaja smiley ekleme fonksiyonu
// Hazırlayan ve scripte eklenmesini öneren Demir Çelenk'e teşekkürler...
function mesaja_ekle(kalip) {
	var konum = document.defter.mesaj;
	kalip = ' ' + kalip + ' ';
	if (konum.createTextRange && konum.caretPos) {
		var caretPos = konum.caretPos;
		caretPos.kalip = caretPos.kalip.charAt(caretPos.kalip.length - 1) == ' ' ? caretPos.kalip + kalip + ' ' : caretPos.kalip + kalip;
		konum.focus();
	} else {
		konum.value  += kalip;
		konum.focus();
	}
}

// Forum kodu fonksiyonu
function ForumKodu(Kod, Metin) {
	if (Kod != "") {
		KodEkle = prompt(Metin,"");
		if ((KodEkle != null) && (KodEkle != "")){
			document.defter.mesaj.value += "[" + Kod + "]" + KodEkle + "[/"+ Kod + "] ";
		}
	}
	document.defter.mesaj.focus();
}

// Form kontrolü fonksiyonu
function bak()
{  
	if (defter.ad.value.length < 3){
    		alert("Lütfen, Adınızı Yazınız...");
    		defter.ad.focus();
    		return (false);
  	}
  
 
  	if (defter.mesaj.value.length < 0) {
    		alert("Lütfen, Mesajınızı Yazınız...");
    		defter.mesaj.focus();
    		return (false);
  	}

  	if (defter.onay_kodu.value.length < 6){
    		alert("Lütfen, Onay Kodunu Yazınız...");
    		defter.onay_kodu.focus();
    		return (false);
  	}
	return (true);
}
