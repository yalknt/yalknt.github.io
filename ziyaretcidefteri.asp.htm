function resizeCaller() {
var dyniframe=new Array()
for (i=0; i<iframeids.length; i++){

function resizeIframe(frameid){
location.href = "#";
var currentfr=document.getElementById(frameid)
currentfr.height = "0"
if (currentfr && !window.opera){
currentfr.style.display="block"
if (currentfr.contentDocument && currentfr.contentDocument.body.offsetHeight) { //ns6 syntax

            if( currentfr.contentDocument.body.offsetHeight < document.getElementById('tablo_1').clientHeight)
            currentfr.height = document.getElementById('tablo_1').clientHeight
            else
            currentfr.height = currentfr.contentDocument.body.offsetHeight+FFextraHeight; 
} else if (currentfr.Document && currentfr.Document.body.scrollHeight) {//ie5+ syntax
            if( currentfr.Document.body.scrollHeight < document.getElementById('tablo_1').clientHeight)
            currentfr.height = document.getElementById('tablo_1').clientHeight
            else currentfr.height = currentfr.Document.body.scrollHeight;
}
if (currentfr.addEventListener)
currentfr.addEventListener("load", readjustIframe, false)
else if (currentfr.attachEvent){
currentfr.detachEvent("onload", readjustIframe) // Bug fix line
currentfr.attachEvent("onload", readjustIframe)
}
}
}


function readjustIframe(loadevt) {
var crossevt=(window.event)? event : loadevt
var iframeroot=(crossevt.currentTarget)? crossevt.currentTarget : crossevt.srcElement
if (iframeroot)
resizeIframe(iframeroot.id);
}

function loadintoIframe(iframeid, url){
if (document.getElementById)
document.getElementById(iframeid).src=url
}

if (window.addEventListener)
window.addEventListener("load", resizeCaller, false)
else if (window.attachEvent)
window.attachEvent("onload", resizeCaller)
else
window.onload=resizeCaller
